<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow, noarchive, nosnippet, noimageindex">
  <meta name="googlebot" content="noindex, nofollow">
  <link rel="shortcut icon" href="/favicon.ico">
  <title>eSUB Tools — sign in</title>
  <style>
    :root {
      --coral: #ed6a5a; --coral-hover: #c54232; --coral-active: #ff9282;
      --ink: #0a121a; --muted: #5a626a; --border: #d7d7d7;
      --bg-soft: #f5f6f7; --card: #ffffff; --text: #323a42; --heading: #0a121a;
    }
    @media (prefers-color-scheme: dark) {
      :root { --bg-soft: #10191f; --card: #323a42; --text: #d7d7d7; --heading: #fff; --muted: #9aa4ad; --border: #3d4650; }
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg-soft); color: var(--text);
      display: flex; align-items: center; justify-content: center; padding: 1.5rem;
      line-height: 1.65; -webkit-font-smoothing: antialiased;
    }
    .card {
      background: var(--card); border: 1px solid var(--border); border-top: 4px solid var(--coral);
      border-radius: 5px; max-width: 32rem; width: 100%; padding: 3rem 2.5rem; text-align: center;
      box-shadow: 0 1px 3px rgba(10,18,26,.06), 0 12px 32px rgba(10,18,26,.08);
    }
    .brand { font-size: 1.75rem; font-weight: 800; letter-spacing: -.02em; color: var(--heading); margin: 0 0 .25rem; }
    .brand span { color: var(--coral); }
    .tagline { font-size: .8rem; font-weight: 600; letter-spacing: .12em; text-transform: uppercase; color: var(--muted); margin: 0 0 1.75rem; }
    p { color: var(--text); margin: 0 0 1.5rem; font-size: 1.02rem; }
    .cta {
      display: inline-flex; align-items: center; gap: 10px; background-color: var(--coral); color: #fff;
      font-family: "Roboto","Inter",sans-serif; font-weight: 700; font-size: 1rem; text-decoration: none;
      padding: 14px 32px; border: none; border-radius: 5px; cursor: pointer; transition: background-color .15s ease;
    }
    .cta:hover, .cta:focus { background-color: var(--coral-hover); }
    .cta:active { background-color: var(--coral-active); }
    .cta:disabled { background-color: var(--muted); cursor: progress; }
    .ms-logo { width: 18px; height: 18px; display: grid; grid-template-columns: 1fr 1fr; gap: 2px; }
    .ms-logo span { display: block; width: 100%; height: 100%; }
    .ms-logo span:nth-child(1){background:#f25022;} .ms-logo span:nth-child(2){background:#7fba00;}
    .ms-logo span:nth-child(3){background:#00a4ef;} .ms-logo span:nth-child(4){background:#ffb900;}
    .error { margin-top: 1rem; padding: 12px 14px; border-left: 3px solid var(--coral); background: rgba(237,106,90,.08); color: var(--coral-hover); font-size: .9rem; border-radius: 4px; text-align: left; display: none; }
  </style>
</head>
<body>
  <main class="card">
    <h1 class="brand">e<span>SUB</span> Tools</h1>
    <p class="tagline">Built for Trade Contractors</p>
    <p>Sign in with your Microsoft account to continue to the requested tool.</p>
    <button id="btn" class="cta" type="button" disabled>
      <span class="ms-logo" aria-hidden="true"><span></span><span></span><span></span><span></span></span>
      <span id="btn-label">Loading…</span>
    </button>
    <div id="err" class="error"></div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@azure/msal-browser@3.30.0/lib/msal-browser.min.js"
          crossorigin="anonymous" referrerpolicy="no-referrer"
          onerror="document.getElementById('btn-label').textContent='Sign-in unavailable';var e=document.getElementById('err');e.textContent='Could not load the Microsoft sign-in library.';e.style.display='block';"></script>
  <script>
    // Keep in sync with /auth-gate.js
    const msalConfig = {
      auth: {
        clientId: "09ed6bee-b6a7-41e4-ad61-1baa08511f58",
        authority: "https://login.microsoftonline.com/9f90601e-35f6-4142-aacf-53f1218356e2",
        redirectUri: window.location.origin + window.location.pathname, // https://tools.esub.com/login/
        postLogoutRedirectUri: window.location.origin + window.location.pathname,
        navigateToLoginRequestUrl: false,
      },
      cache: { cacheLocation: "localStorage", storeAuthStateInCookie: false },
    };
    const loginRequest = { scopes: ["User.Read"] };
    const pendingReturn = (new URLSearchParams(window.location.search)).get("return") || "/";

    const btn = document.getElementById("btn");
    const btnLabel = document.getElementById("btn-label");
    const errEl = document.getElementById("err");
    function showErr(m){ errEl.textContent = m; errEl.style.display = "block"; }

    // Same-origin, root-relative return only (prevents open redirect).
    function safeReturn(u){
      if (!u) return "/";
      try { const x = new URL(u, window.location.origin);
        return (x.origin === window.location.origin && x.pathname.startsWith("/")) ? (x.pathname + x.search + x.hash) : "/";
      } catch { return "/"; }
    }

    let pca = null;
    async function init(){
      if (typeof msal === "undefined" || !msal.PublicClientApplication) { showErr("Microsoft sign-in library did not load."); btnLabel.textContent="Unavailable"; return; }
      pca = new msal.PublicClientApplication(msalConfig);
      await pca.initialize();
      try {
        const res = await pca.handleRedirectPromise();
        if (res && res.account) { pca.setActiveAccount(res.account); window.location.replace(safeReturn(res.state)); return; }
      } catch (e) { showErr("Sign-in failed: " + (e.message || e)); }
      const acct = pca.getActiveAccount() || pca.getAllAccounts()[0];
      if (acct) { pca.setActiveAccount(acct); window.location.replace(safeReturn(pendingReturn)); return; }
      btn.disabled = false; btnLabel.textContent = "Sign in with Microsoft";
    }
    btn.addEventListener("click", async () => {
      btn.disabled = true; btnLabel.textContent = "Redirecting…";
      try { await pca.loginRedirect({ ...loginRequest, state: pendingReturn }); }
      catch (e) { showErr("Could not start sign-in: " + (e.message || e)); btn.disabled=false; btnLabel.textContent="Sign in with Microsoft"; }
    });
    init();
  </script>
</body>
</html>
